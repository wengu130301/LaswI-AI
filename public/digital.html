<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字系列 · LaswI Cloud</title>
    <style>
        /* ========== 全局样式变量（与主站一致）========== */
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --header-border: #e9ecef;
            --text-primary: #1e1e1e;
            --text-secondary: #666;
            --text-muted: #999;
            --border-light: #ddd;
            --card-bg: #f8f9fa;
            --input-bg: white;
            --btn-primary-bg: #0066ff;
            --btn-primary-hover: #0052cc;
            --btn-secondary-bg: #e9ecef;
            --btn-secondary-hover: #dee2e6;
            --token-bg: #e9ecef;
            --badge-bg: #e9ecef;
            --badge-text: #495057;
            --success-bg: #d4edda;
            --success-text: #155724;
            --error-bg: #f8d7da;
            --error-text: #721c24;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --header-border: #404040;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-light: #404040;
            --card-bg: #3a3a3a;
            --input-bg: #3a3a3a;
            --btn-primary-bg: #0066ff;
            --btn-primary-hover: #0052cc;
            --btn-secondary-bg: #404040;
            --btn-secondary-hover: #505050;
            --token-bg: #404040;
            --badge-bg: #404040;
            --badge-text: #b0b0b0;
            --success-bg: #1e3a2a;
            --success-text: #8bc34a;
            --error-bg: #3f2a2a;
            --error-text: #ff6b6b;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066ff, #5f9eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .card h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.2rem;
            color: var(--text-primary);
        }
        .token-box {
            background: var(--token-bg);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .token-text {
            font-family: monospace;
            word-break: break-all;
            font-size: 0.9rem;
            color: var(--btn-primary-bg);
            background: var(--input-bg);
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--border-light);
            flex: 1;
        }
        .copy-btn {
            background: var(--btn-primary-bg);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: var(--btn-primary-hover);
        }
        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-light);
        }
        .feature-item:last-child {
            border-bottom: none;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 52px;
            height: 26px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .2s;
            border-radius: 26px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .2s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--btn-primary-bg);
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .btn-save {
            background: var(--btn-primary-bg);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 14px 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn-save:hover {
            background: var(--btn-primary-hover);
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            text-align: center;
        }
        .success {
            background: var(--success-bg);
            color: var(--success-text);
            display: block;
        }
        .error {
            background: var(--error-bg);
            color: var(--error-text);
            display: block;
        }
        .note {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 20px;
            text-align: center;
        }
        /* 简单主题切换按钮（可选） */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--container-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-primary);
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>

    <div class="container">
        <h1>📱 数字系列</h1>
        <div class="subtitle">管理你的快捷指令配置，所有更改自动同步到设备</div>

        <!-- API 令牌卡片 -->
        <div class="card">
            <h3>🔑 你的 API 令牌</h3>
            <p style="color:var(--text-secondary); margin-bottom:10px;">在快捷指令中添加此令牌以连接 Cloud</p>
            <div class="token-box">
                <span id="apiToken" class="token-text">加载中...</span>
                <button class="copy-btn" onclick="copyToken()">复制</button>
            </div>
        </div>

        <!-- 功能开关卡片 -->
        <div class="card">
            <h3>⚙️ 功能开关</h3>
            <div id="featuresContainer"></div>
        </div>

        <button class="btn-save" onclick="saveConfig()">保存设置</button>
        <div id="message" class="message"></div>
        <div class="note">* 修改后请在快捷指令中重新运行以生效</div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            alert('请先登录');
            window.location.href = '/';
        }

        let features = {};

        // ---------- 暗色模式 ----------
        let theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        const themeBtn = document.querySelector('.theme-toggle');
        themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';

        window.toggleTheme = () => {
            theme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
        };

        // ---------- 加载 API 令牌 ----------
        async function loadToken() {
            try {
                const res = await fetch('/api/user/token', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('apiToken').textContent = data.token;
                } else {
                    document.getElementById('apiToken').textContent = '获取失败';
                }
            } catch (err) {
                document.getElementById('apiToken').textContent = '网络错误';
            }
        }

        // 复制令牌
        window.copyToken = () => {
            const tokenText = document.getElementById('apiToken').textContent;
            if (tokenText && tokenText !== '加载中...' && tokenText !== '获取失败' && tokenText !== '网络错误') {
                navigator.clipboard.writeText(tokenText).then(() => {
                    alert('令牌已复制到剪贴板');
                }).catch(() => {
                    alert('复制失败，请手动复制');
                });
            }
        };

        // ---------- 加载配置 ----------
        async function loadConfig() {
            try {
                const res = await fetch('/api/digital/config', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (res.ok) {
                    features = data.features || { voice_enabled: false, notification_enabled: true };
                    renderFeatures(features);
                } else {
                    showMessage('加载配置失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误', 'error');
            }
        }

        function renderFeatures(features) {
            const container = document.getElementById('featuresContainer');
            container.innerHTML = '';
            // 映射后端字段名到前端显示文字
            const featureLabels = {
                voice_enabled: '整点播报',
                notification_enabled: '90%电量提示'
            };
            for (let key in features) {
                const label = featureLabels[key] || key;
                const div = document.createElement('div');
                div.className = 'feature-item';
                div.innerHTML = `
                    <span>${label}</span>
                    <label class="switch">
                        <input type="checkbox" data-key="${key}" ${features[key] ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(div);
            }
        }

        // ---------- 保存配置 ----------
        window.saveConfig = () => {
            const checkboxes = document.querySelectorAll('#featuresContainer input[type=checkbox]');
            const newFeatures = {};
            checkboxes.forEach(cb => {
                newFeatures[cb.dataset.key] = cb.checked;
            });

            fetch('/api/digital/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ features: newFeatures })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showMessage('保存成功！', 'success');
                } else {
                    showMessage('保存失败', 'error');
                }
            })
            .catch(() => showMessage('网络错误', 'error'));
        };

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => {
                msg.className = 'message';
            }, 3000);
        }

        // 初始化
        loadToken();
        loadConfig();
    </script>
</body>
</html>
