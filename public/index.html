<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LaswI AI · 智能助手</title>
    <style>
        /* ========== 全局样式变量 ========== */
        :root {
            --bg-color: #f0f2f5;
            --container-bg: white;
            --header-border: #e9ecef;
            --text-primary: #1e1e1e;
            --text-secondary: #666;
            --text-muted: #999;
            --border-light: #ddd;
            --chat-bg: #fafbfc;
            --bubble-user-bg: #0066ff;
            --bubble-assistant-bg: white;
            --bubble-assistant-border: #e9ecef;
            --avatar-assistant-bg: white;
            --avatar-assistant-border: #dee2e6;
            --input-border: #dee2e6;
            --input-focus-border: #0066ff;
            --btn-primary-bg: #0066ff;
            --btn-primary-hover: #0052cc;
            --btn-primary-disabled: #a0c4ff;
            --btn-secondary-bg: transparent;
            --btn-secondary-border: #ddd;
            --btn-secondary-hover: #f5f5f5;
            --icon-opacity: 0.6;
            --icon-hover-opacity: 1;
            --modal-overlay: rgba(0,0,0,0.5);
        }

        /* 暗色模式变量 */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --header-border: #404040;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --text-muted: #808080;
            --border-light: #404040;
            --chat-bg: #252525;
            --bubble-user-bg: #0066ff;
            --bubble-assistant-bg: #3a3a3a;
            --bubble-assistant-border: #505050;
            --avatar-assistant-bg: #3a3a3a;
            --avatar-assistant-border: #606060;
            --input-border: #404040;
            --input-focus-border: #0066ff;
            --btn-primary-bg: #0066ff;
            --btn-primary-hover: #0052cc;
            --btn-primary-disabled: #335c8a;
            --btn-secondary-bg: transparent;
            --btn-secondary-border: #404040;
            --btn-secondary-hover: #3a3a3a;
            --icon-opacity: 0.7;
            --icon-hover-opacity: 1;
            --modal-overlay: rgba(0,0,0,0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: var(--bg-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.2s;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-overlay);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 16px;
        }
        .modal-content {
            background: var(--container-bg);
            color: var(--text-primary);
            padding: 32px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: background 0.2s, color 0.2s;
        }
        .modal-content h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid var(--border-light);
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            background: var(--container-bg);
            color: var(--text-primary);
            transition: border 0.2s, background 0.2s;
        }
        .modal-content input:focus {
            border-color: var(--input-focus-border);
        }
        .modal-content button {
            margin: 8px 4px;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border 0.2s;
        }
        .btn-primary {
            background: var(--btn-primary-bg);
            color: white;
        }
        .btn-primary:hover {
            background: var(--btn-primary-hover);
        }
        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-primary);
            border: 1px solid var(--btn-secondary-border);
        }
        .btn-secondary:hover {
            background: var(--btn-secondary-hover);
        }
        #authError {
            color: #dc3545;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        /* 聊天容器 */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: var(--container-bg);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.2s;
        }
        header {
            padding: 12px 20px;
            background: var(--container-bg);
            border-bottom: 1px solid var(--header-border);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px 12px;
            transition: background 0.2s, border 0.2s;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0066ff, #5f9eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
        }
        .badge {
            background: var(--border-light);
            color: var(--text-secondary);
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 30px;
            font-weight: 500;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }
        #user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        #username-display {
            font-weight: 500;
            color: var(--text-primary);
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 6px 10px;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            line-height: 1;
        }
        .icon-btn:hover {
            background: var(--btn-secondary-hover);
            border-color: var(--text-secondary);
        }
        .icon-btn.on {
            background: var(--btn-primary-bg);
            color: white;
            border-color: var(--btn-primary-bg);
        }
        #auto-speak-toggle, #theme-toggle {
            font-size: 1.1rem;
        }
        #voice-btn {
            font-size: 1.2rem;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px;
            background: var(--chat-bg);
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: background 0.2s;
        }
        .message {
            display: flex;
            max-width: 90%;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 500;
            flex-shrink: 0;
            transition: background 0.2s, border 0.2s, color 0.2s;
        }
        .user-message .avatar {
            background: var(--bubble-user-bg);
            color: white;
            margin-left: 8px;
        }
        .assistant-message .avatar {
            background: var(--avatar-assistant-bg);
            border: 1px solid var(--avatar-assistant-border);
            color: var(--text-primary);
            margin-right: 8px;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 1rem;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: background 0.2s, color 0.2s, border 0.2s;
        }
        .user-message .bubble {
            background: var(--bubble-user-bg);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .assistant-message .bubble {
            background: var(--bubble-assistant-bg);
            color: var(--text-primary);
            border: 1px solid var(--bubble-assistant-border);
            border-bottom-left-radius: 5px;
        }
        .speaker-icon {
            display: inline-block;
            margin-left: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: var(--icon-opacity);
            transition: opacity 0.2s, color 0.2s;
            align-self: center;
            color: var(--text-secondary);
        }
        .speaker-icon:hover {
            opacity: var(--icon-hover-opacity);
            color: var(--btn-primary-bg);
        }
        .speaker-icon.speaking {
            opacity: 1;
            color: var(--btn-primary-bg);
        }
        .input-area {
            padding: 12px 16px;
            background: var(--container-bg);
            border-top: 1px solid var(--header-border);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            transition: background 0.2s, border 0.2s;
        }
        #user-input {
            flex: 1 1 200px;
            min-width: 150px;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            background: var(--container-bg);
            color: var(--text-primary);
            transition: border 0.2s, background 0.2s, color 0.2s;
        }
        #user-input:focus {
            border-color: var(--input-focus-border);
        }
        #voice-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 30px;
            width: 46px;
            height: 46px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        #voice-btn:hover {
            background: var(--btn-secondary-hover);
            border-color: var(--text-secondary);
        }
        #voice-btn.listening {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,68,68,0); }
        }
        #send-btn {
            background: var(--btn-primary-bg);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        #send-btn:hover {
            background: var(--btn-primary-hover);
        }
        #send-btn:active {
            transform: scale(0.96);
        }
        #send-btn:disabled {
            background: var(--btn-primary-disabled);
            cursor: not-allowed;
        }
        .loading-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%,60%,100% { opacity: 0.3; transform: scale(1); }
            30% { opacity: 1; transform: scale(1.2); }
        }
        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            text-align: center;
            margin: 10px 0;
        }

        /* 移动端微调 */
        @media (max-width: 500px) {
            .header-left h1 { font-size: 1.2rem; }
            .badge { display: none; }
            #username-display { max-width: 80px; }
            .icon-btn { padding: 6px 8px; font-size: 0.9rem; }
            #voice-btn { width: 40px; height: 40px; }
            #send-btn { padding: 10px 16px; }
        }
    </style>
</head>
<body>
    <!-- 登录模态框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>LaswI AI</h2>
            <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
            <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
            <div style="margin-top: 20px;">
                <button class="btn-primary" onclick="handleLogin()">登录</button>
                <button class="btn-secondary" onclick="handleRegister()">注册</button>
                <button class="btn-secondary" onclick="closeAuthModal()">取消</button>
            </div>
            <p id="authError"></p>
        </div>
    </div>

    <!-- 聊天主界面 -->
    <div id="chatContainer" class="chat-container">
        <header>
            <div class="header-left">
                <h1>LaswI AI</h1>
                <span class="badge">腾讯混元 · 驱动</span>
            </div>
            <div id="user-info">
                <span id="username-display"></span>
                <!-- 产品线入口 -->
                <a href="/maps.html" class="icon-btn" style="text-decoration: none;">🗺️地图</a>

                <a href="/digital.html" class="icon-btn" style="text-decoration: none;">📱数字</a>
                <a href="/silent.html" class="icon-btn" style="text-decoration: none;">🐾Silent</a>
                <a href="/pro.html" class="icon-btn" style="text-decoration: none;">⭐Pro</a>
                <a href="/cyber.html" class="icon-btn" style="text-decoration: none;">💻Cyber</a>
                <!-- 暗色模式切换按钮 -->
                <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="切换主题">🌙</button>
                <!-- 自动朗读开关 -->
                <button id="auto-speak-toggle" class="icon-btn" onclick="toggleAutoSpeak()" title="自动朗读">🔇</button>
                <!-- 二维码入口 -->
                <a href="/my-qr.html" id="qr-link" class="icon-btn" style="text-decoration: none;">🔲</a>
                <button id="auth-btn" class="icon-btn" onclick="showAuthModal()">登录/注册</button>
                <button id="logoutBtn" class="icon-btn" onclick="logout()" style="display: none;">退出</button>
            </div>
        </header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入你的问题..." autofocus>
            <!-- 语音输入按钮 -->
            <button id="voice-btn" class="icon-btn" onclick="toggleVoiceInput()" title="语音输入">🎤</button>
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let token = localStorage.getItem('token');
        let currentUser = null;
        let messages = [{ role: 'system', content: '你叫LaswI，是一个由腾讯混元大模型驱动的智能助手。请用友好、温暖、专业的中文回答用户问题。' }];
        let isAutoSpeakOn = localStorage.getItem('autoSpeak') === 'true' || false;
        let isListening = false;
        let recognition = null;
        let theme = localStorage.getItem('theme') || 'light';

        // DOM 元素
        const authModal = document.getElementById('authModal');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const authError = document.getElementById('authError');
        const authBtn = document.getElementById('auth-btn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameDisplay = document.getElementById('username-display');
        const autoSpeakToggle = document.getElementById('auto-speak-toggle');
        const voiceBtn = document.getElementById('voice-btn');
        const themeToggle = document.getElementById('theme-toggle');

        // ---------- 拦截 fetch，处理401 ----------
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
            return originalFetch.apply(this, args).then(response => {
                if (response.status === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    alert('您的登录已过期，请重新登录');
                    window.location.href = '/';
                }
                return response;
            });
        };

        // ---------- 初始化主题 ----------
        document.documentElement.setAttribute('data-theme', theme);
        updateThemeButtons();

        function updateThemeButtons() {
            const icon = theme === 'dark' ? '☀️' : '🌙';
            if (themeToggle) themeToggle.textContent = icon;
        }

        window.toggleTheme = () => {
            theme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeButtons();
        };

        // ---------- 自动朗读开关 ----------
        function updateAutoSpeakUI() {
            const icon = isAutoSpeakOn ? '🔊' : '🔇';
            if (autoSpeakToggle) {
                autoSpeakToggle.textContent = icon;
                autoSpeakToggle.classList.toggle('on', isAutoSpeakOn);
            }
        }
        window.toggleAutoSpeak = () => {
            isAutoSpeakOn = !isAutoSpeakOn;
            localStorage.setItem('autoSpeak', isAutoSpeakOn);
            updateAutoSpeakUI();
        };
        updateAutoSpeakUI();

        // ---------- 语音识别初始化 ----------
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                stopListening();
            };

            recognition.onerror = (event) => {
                console.error('语音识别错误:', event.error);
                stopListening();
                if (event.error === 'not-allowed') {
                    alert('请允许麦克风权限');
                }
            };

            recognition.onend = () => {
                stopListening();
            };
        } else {
            if (voiceBtn) voiceBtn.style.display = 'none';
        }

        function stopListening() {
            if (isListening) {
                recognition.stop();
                isListening = false;
                if (voiceBtn) {
                    voiceBtn.classList.remove('listening');
                    voiceBtn.textContent = '🎤';
                }
            }
        }

        window.toggleVoiceInput = () => {
            if (!recognition) {
                alert('您的浏览器不支持语音识别');
                return;
            }
            if (isListening) {
                stopListening();
            } else {
                try {
                    recognition.start();
                    isListening = true;
                    voiceBtn.classList.add('listening');
                    voiceBtn.textContent = '⏹️';
                } catch (e) {
                    console.error('启动语音识别失败:', e);
                }
            }
        };

        // ---------- 用户界面更新 ----------
        function updateUIForUser() {
            authBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            usernameDisplay.textContent = currentUser.username;
        }
        function updateUIForGuest() {
            authBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
            usernameDisplay.textContent = '';
        }

        window.showAuthModal = () => authModal.style.display = 'flex';
        window.closeAuthModal = () => {
            authModal.style.display = 'none';
            authError.innerText = '';
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
        };

        async function handleLogin() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!username || !password) {
                authError.innerText = '用户名和密码不能为空';
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    currentUser = data.user;
                    closeAuthModal();
                    updateUIForUser();
                    messages = [{ role: 'system', content: messages[0].content }];
                    renderMessages();
                    await fetchHistory();
                } else {
                    authError.innerText = data.error || '登录失败';
                }
            } catch (err) {
                authError.innerText = '网络错误，请重试';
            }
        }

        async function handleRegister() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!username || !password) {
                authError.innerText = '用户名和密码不能为空';
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    currentUser = data.user;
                    closeAuthModal();
                    updateUIForUser();
                    messages = [{ role: 'system', content: messages[0].content }];
                    renderMessages();
                } else {
                    authError.innerText = data.error || '注册失败';
                }
            } catch (err) {
                authError.innerText = '网络错误，请重试';
            }
        }

        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;

        window.logout = () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            token = null;
            currentUser = null;
            updateUIForGuest();
            messages = [{ role: 'system', content: messages[0].content }];
            renderMessages();
            stopListening();
        };

        // ---------- 朗读功能 ----------
        function speakText(text, speakerElement) {
            if (!window.speechSynthesis) {
                alert('您的浏览器不支持语音朗读功能');
                return;
            }
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
                document.querySelectorAll('.speaker-icon').forEach(el => el.classList.remove('speaking'));
            }
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            utterance.volume = 1.0;
            const voices = speechSynthesis.getVoices();
            const chineseVoice = voices.find(v => v.lang.includes('zh'));
            if (chineseVoice) utterance.voice = chineseVoice;
            utterance.onstart = () => { if (speakerElement) speakerElement.classList.add('speaking'); };
            utterance.onend = () => { if (speakerElement) speakerElement.classList.remove('speaking'); };
            utterance.onerror = () => { if (speakerElement) speakerElement.classList.remove('speaking'); };
            speechSynthesis.speak(utterance);
        }

        // ---------- 渲染消息 ----------
        function renderMessages() {
            chatBox.innerHTML = '';
            const displayMessages = messages.filter(m => m.role !== 'system');
            displayMessages.forEach((msg, index) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = msg.role === 'user' ? '我' : 'AI';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = msg.content;
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(bubble);
                if (msg.role === 'assistant') {
                    const speaker = document.createElement('span');
                    speaker.className = 'speaker-icon';
                    speaker.textContent = '🔊';
                    speaker.onclick = () => speakText(msg.content, speaker);
                    messageDiv.appendChild(speaker);
                }
                chatBox.appendChild(messageDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function fetchHistory() {
            if (!token) return;
            try {
                const res = await fetch('/api/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const history = await res.json();
                    messages = [{ role: 'system', content: messages[0].content }, ...history];
                    renderMessages();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.disabled = true;
            sendBtn.disabled = true;

            messages.push({ role: 'user', content: text });
            renderMessages();
            userInput.value = '';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant-message';
            loadingDiv.id = 'loading-indicator';
            loadingDiv.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ messages })
                });

                document.getElementById('loading-indicator')?.remove();

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                messages.push({ role: 'assistant', content: data.reply });
                renderMessages();

                if (isAutoSpeakOn) {
                    const speakers = document.querySelectorAll('.speaker-icon');
                    if (speakers.length > 0) {
                        const lastSpeaker = speakers[speakers.length - 1];
                        const lastAssistantMsg = messages.filter(m => m.role === 'assistant').pop();
                        if (lastAssistantMsg) {
                            speakText(lastAssistantMsg.content, lastSpeaker);
                        }
                    }
                }
            } catch (error) {
                document.getElementById('loading-indicator')?.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message assistant-message';
                errorDiv.innerHTML = `<div class="avatar">AI</div><div class="bubble" style="color:#dc3545;">😵 出错了：${error.message}</div>`;
                chatBox.appendChild(errorDiv);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        if (window.speechSynthesis) {
            speechSynthesis.getVoices();
        }

        // 初始化
        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUser = { id: payload.userId, username: payload.username };
                updateUIForUser();
                fetchHistory();
            } catch (e) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                token = null;
                updateUIForGuest();
            }
        } else {
            updateUIForGuest();
        }

        // 点击模态框外部关闭
        window.onclick = (event) => {
            if (event.target === authModal) closeAuthModal();
        };
    </script>
</body>
</html>
