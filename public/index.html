<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LaswI AI · 智能助手</title>
    <style>
        /* ========== 完整样式（和你之前正常时一样）========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: white;
            padding: 40px 32px;
            border-radius: 24px;
            width: 340px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        .modal-content h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #000;
        }
        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .modal-content input:focus {
            border-color: #0066ff;
        }
        .modal-content button {
            margin: 8px 4px;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #000;
            color: white;
        }
        .btn-primary:hover {
            background: #333;
        }
        .btn-secondary {
            background: #fff;
            color: #000;
            border: 1px solid #ddd;
        }
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        #authError {
            color: #dc3545;
            margin-top: 12px;
            font-size: 0.9rem;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        header {
            padding: 20px 24px;
            background: white;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0066ff, #5f9eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            background: #e9ecef;
            color: #495057;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 30px;
            font-weight: 500;
        }
        #user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #username-display {
            font-weight: 500;
            color: #333;
        }
        #auth-btn {
            background: transparent;
            border: 1px solid #ddd;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        #auth-btn:hover {
            background: #f5f5f5;
            border-color: #aaa;
        }
        #logoutBtn {
            background: transparent;
            border: 1px solid #ddd;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        #logoutBtn:hover {
            background: #f5f5f5;
            border-color: #aaa;
        }
        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .message {
            display: flex;
            max-width: 85%;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 500;
            flex-shrink: 0;
        }
        .user-message .avatar {
            background: #0066ff;
            color: white;
            margin-left: 10px;
        }
        .assistant-message .avatar {
            background: #ffffff;
            border: 1px solid #dee2e6;
            color: #212529;
            margin-right: 10px;
        }
        .bubble {
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .user-message .bubble {
            background: #0066ff;
            color: white;
            border-bottom-right-radius: 5px;
        }
        .assistant-message .bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e9ecef;
            border-bottom-left-radius: 5px;
        }
        .input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        #user-input {
            flex: 1;
            border: 1px solid #dee2e6;
            border-radius: 30px;
            padding: 14px 20px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #user-input:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }
        #send-btn {
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        #send-btn:hover {
            background: #0052cc;
        }
        #send-btn:active {
            transform: scale(0.96);
        }
        #send-btn:disabled {
            background: #a0c4ff;
            cursor: not-allowed;
        }
        .loading-dots {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: #868e96;
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%,60%,100% { opacity: 0.3; transform: scale(1); }
            30% { opacity: 1; transform: scale(1.2); }
        }
        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            text-align: center;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <!-- 登录模态框 -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>LaswI AI</h2>
            <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
            <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
            <div style="margin-top: 20px;">
                <button class="btn-primary" onclick="handleLogin()">登录</button>
                <button class="btn-secondary" onclick="handleRegister()">注册</button>
                <button class="btn-secondary" onclick="closeAuthModal()">取消</button>
            </div>
            <p id="authError"></p>
        </div>
    </div>

    <!-- 聊天主界面 -->
    <div id="chatContainer" class="chat-container">
        <header>
            <div class="header-left">
                <h1>LaswI AI</h1>
                <span class="badge">腾讯混元 · 驱动</span>
            </div>
            <div id="user-info">
                <span id="username-display"></span>
                <button id="auth-btn" onclick="showAuthModal()">登录 / 注册</button>
                <button id="logoutBtn" onclick="logout()" style="display: none;">退出</button>
            </div>
        </header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入你的问题..." autofocus>
            <!-- 关键修复：添加 onclick 属性，确保点击总能触发 sendMessage -->
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let token = localStorage.getItem('token');
        let currentUser = null;
        let messages = [{ role: 'system', content: '你叫LaswI，是一个由腾讯混元大模型驱动的智能助手。请用友好、温暖、专业的中文回答用户问题。' }];

        // DOM 元素
        const authModal = document.getElementById('authModal');
        const chatContainer = document.getElementById('chatContainer');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const authError = document.getElementById('authError');
        const authBtn = document.getElementById('auth-btn');
        const logoutBtn = document.getElementById('logoutBtn');
        const usernameDisplay = document.getElementById('username-display');

        // ---------- 初始化 ----------
        if (token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                currentUser = { id: payload.userId, username: payload.username };
                updateUIForUser();
                fetchHistory();
            } catch (e) {
                localStorage.removeItem('token');
                token = null;
                updateUIForGuest();
            }
        } else {
            updateUIForGuest();
        }

        function updateUIForUser() {
            authBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            usernameDisplay.textContent = currentUser.username;
        }
        function updateUIForGuest() {
            authBtn.style.display = 'inline-block';
            logoutBtn.style.display = 'none';
            usernameDisplay.textContent = '';
        }

        // 模态框控制
        window.showAuthModal = () => authModal.style.display = 'flex';
        window.closeAuthModal = () => {
            authModal.style.display = 'none';
            authError.innerText = '';
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
        };

        // 登录
        async function handleLogin() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!username || !password) {
                authError.innerText = '用户名和密码不能为空';
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    currentUser = data.user;
                    closeAuthModal();
                    updateUIForUser();
                    messages = [{ role: 'system', content: messages[0].content }];
                    renderMessages();
                    await fetchHistory();
                } else {
                    authError.innerText = data.error || '登录失败';
                }
            } catch (err) {
                authError.innerText = '网络错误，请重试';
            }
        }

        // 注册
        async function handleRegister() {
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!username || !password) {
                authError.innerText = '用户名和密码不能为空';
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    currentUser = data.user;
                    closeAuthModal();
                    updateUIForUser();
                    messages = [{ role: 'system', content: messages[0].content }];
                    renderMessages();
                } else {
                    authError.innerText = data.error || '注册失败';
                }
            } catch (err) {
                authError.innerText = '网络错误，请重试';
            }
        }

        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;

        // 退出
        window.logout = () => {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            updateUIForGuest();
            messages = [{ role: 'system', content: messages[0].content }];
            renderMessages();
        };

        // 渲染
        function renderMessages() {
            chatBox.innerHTML = '';
            const displayMessages = messages.filter(m => m.role !== 'system');
            displayMessages.forEach(msg => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = msg.role === 'user' ? '我' : 'AI';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = msg.content;
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(bubble);
                chatBox.appendChild(messageDiv);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 加载历史
        async function fetchHistory() {
            if (!token) return;
            try {
                const res = await fetch('/api/history', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const history = await res.json();
                    messages = [{ role: 'system', content: messages[0].content }, ...history];
                    renderMessages();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // 发送消息（已声明为全局函数，供 onclick 调用）
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.disabled = true;
            sendBtn.disabled = true;

            messages.push({ role: 'user', content: text });
            renderMessages();
            userInput.value = '';

            // 显示加载动画
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant-message';
            loadingDiv.id = 'loading-indicator';
            loadingDiv.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ messages })
                });

                document.getElementById('loading-indicator')?.remove();

                if (!response.ok) throw new Error('请求失败');

                const data = await response.json();
                messages.push({ role: 'assistant', content: data.reply });
                renderMessages();
            } catch (error) {
                document.getElementById('loading-indicator')?.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message assistant-message';
                errorDiv.innerHTML = `<div class="avatar">AI</div><div class="bubble" style="color:#dc3545;">😵 出错了：${error.message}</div>`;
                chatBox.appendChild(errorDiv);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // 额外保险：同时保留 addEventListener，但 onclick 已经足够
        if (sendBtn) {
            sendBtn.addEventListener('click', sendMessage);
        }

        // 回车发送
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
