<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaswI AI · 智能助手</title>
    <style>
        /* 样式代码 (和之前一样，这里省略节省空间，但实际使用时需要保留完整样式) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
        /* 为了完整，请使用你之前能正常显示的样式，或从历史记录中复制 */
    </style>
</head>
<body>
    <!-- 登录模态框 (略，同上) -->
    <div id="authModal" class="modal">...</div>

    <!-- 聊天主界面 -->
    <div id="chatContainer" class="chat-container">
        <header>...</header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入你的问题..." autofocus>
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let token = localStorage.getItem('token');
        let currentUser = null;
        let messages = [{ role: 'system', content: '你叫LaswI，是一个由腾讯混元大模型驱动的智能助手。' }];

        // DOM 元素
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // ---------- 确保按钮可用 ----------
        sendBtn.disabled = false;  // 强制启用按钮

        // ---------- 发送消息函数 ----------
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 测试：打印日志，确认函数被调用
            console.log('发送消息:', text);

            // 这里写你的发送逻辑（调用后端API）...
            // 为了测试，可以先简单把用户消息显示在聊天框
            const msgDiv = document.createElement('div');
            msgDiv.textContent = '你: ' + text;
            chatBox.appendChild(msgDiv);
            userInput.value = '';
        }

        // ---------- 绑定事件 ----------
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // 测试：控制台输出确认
        console.log('页面加载完成，按钮已绑定事件');
    </script>
</body>
</html>
