<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>扫码登录 - LaswI</title>
    <style>
        body { font-family: system-ui; text-align: center; padding: 20px; background: #f5f5f5; }
        .container { max-width: 400px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-size: 1.8rem; margin-bottom: 20px; }
        #message { margin: 20px 0; color: #333; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0066ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LaswI 扫码登录</h1>
        <div id="message">正在验证二维码...</div>
        <div class="spinner"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (!code) {
            document.getElementById('message').innerHTML = '<span class="error">无效的二维码</span>';
            document.querySelector('.spinner').style.display = 'none';
        } else {
            fetch('/api/qr/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            })
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    }
                    document.getElementById('message').innerHTML = '登录成功！正在跳转...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    document.getElementById('message').innerHTML = `<span class="error">${data.error || '登录失败'}</span>`;
                    document.querySelector('.spinner').style.display = 'none';
                }
            })
            .catch(err => {
                document.getElementById('message').innerHTML = '<span class="error">网络错误</span>';
                document.querySelector('.spinner').style.display = 'none';
                console.error(err);
            });
        }
    </script>
</body>
</html>
